server {
  listen 80;
  server_name _;

  root /var/www/admin-prototype-system;
  index index.html;

  # Vite outputs hashed assets, so they can be cached aggressively.
  location /assets/ {
    expires 30d;
    add_header Cache-Control "public, max-age=2592000, immutable";
    try_files $uri =404;
  }

  # SPA fallback for react-router browser history.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
